<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify – Web Player: Music for everyone</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/music-metadata-browser@2.5.9/dist/music-metadata-browser.min.js" defer></script>
</head>

<body>
    <!-- <img src="img/logo.svg" alt=""> -->
    <div class="container flex  bg-black">
        <div class="left">
            <div class="home bg-gray rounded m-1 p-1">
                <div class="logoClose">
                    <div><img src="img/logo.svg" class="invert logo" alt="Spotify"></div>
                    <div class="close">
                        <img src="img/close.svg" class="close-left" alt="">
                    </div>
                </div>
                <ul>
                    <li><img src="img/home.svg" class="invert" alt="home">Home</li>
                    <li><img src="img/search.svg" class="invert" alt="search">Search</li>

                </ul>
            </div>
            <div class="library bg-gray rounded m-1 p-1">
                <div class="heading">
                    <img src="img/playlist.svg" class="invert" alt="playlist">
                    <h2>Your Library</h2>
                </div>

                <div class="songlist">
                    <ul>
                    </ul>
                </div>

                <div class="footer">
                    <div><a href="https://www.spotify.com/jp/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a>
                    </div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                </div>
            </div>
        </div>
        <div class="right bg-gray rounded p-1 m-1">
            <div class="header">
                <div class="nav">
                    <img src="img/hamburger.svg" class="invert burger">
                    <img src="img/left-arrow.svg" class="arrows invert" alt="">
                    <img src="img/right-arrrow.svg" class="arrows invert" alt="">
                </div>
                <div class="buttons">
                    <button class="sign-up">Sign Up</button>
                    <button class="login">Login</button>
                </div>
            </div>

            <div class="spotify-playlist">
                <h1>Spotify Playlists</h1>
                <div class="card-container">
                </div>
            </div>

            <div class="player">
                <div class="songInfo">
                    Track Info
                </div>

                <div class="playButtons">
                    <img src="img/shuffle.svg" id="shuffle" class="invert" alt="" title="Shuffle all tracks">
                    <img src="img/previous.svg" id="previous" class="invert" alt="" title="Previous Song">
                    <img src="img/player-play.svg" id="play" alt="" title="Play">
                    <img src="img/next.svg" id="next" class="invert" alt="" title="Next Song">
                    <img src="img/loop.svg" id="loop" class="invert" alt="" title="Loop">
                </div>

                <div class="playbar-bottom">
                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>
                    <div class="songTime">
                        00:00/00:00
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
